<div class="auth-outer">
  <div class="auth-card-wrap">

    <!-- Logo + Title -->
    <div class="auth-hero">
      <div class="auth-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="#eef3ef">
          <path d="M12 17.5 C8.4 16 4.8 13.4 3 9.8 C6.8 10 10 12.8 12 17.5 Z" fill-opacity=".5"/>
          <path d="M12 17.5 C15.6 16 19.2 13.4 21 9.8 C17.2 10 14 12.8 12 17.5 Z" fill-opacity=".5"/>
          <path d="M12 17.5 C9.6 14.2 7.8 10.8 7.4 6.8 C10.2 8.4 11.4 12.6 12 17.5 Z" fill-opacity=".8"/>
          <path d="M12 17.5 C14.4 14.2 16.2 10.8 16.6 6.8 C13.8 8.4 12.6 12.6 12 17.5 Z" fill-opacity=".8"/>
          <path d="M12 4 C13.4 8.5 13.4 13 12 17.5 C10.6 13 10.6 8.5 12 4 Z"/>
        </svg>
      </div>
      <h1 class="auth-title">Sadhana Report</h1>
      <p class="auth-quote">"The discipline you keep today becomes the grace you receive tomorrow."</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <h2 class="auth-card-title">Welcome back</h2>
      <p class="auth-card-sub">Sign in to continue your practice</p>

      @if (state.authError()) {
        <div class="auth-error">
          <span>{{ state.authError() }}</span>
          <button class="auth-error-dismiss" (click)="state.authError.set('')" aria-label="Dismiss">×</button>
        </div>
      }

      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input
          class="auth-input"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
          [value]="email()"
          (input)="onEmail($event)"
          (keydown)="onKey($event)"
        >
      </div>

      <div class="auth-field">
        <label class="auth-label">Password</label>
        <div class="auth-pw-wrap">
          <input
            class="auth-input"
            [type]="showPw() ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="current-password"
            [value]="password()"
            (input)="onPassword($event)"
            (keydown)="onKey($event)"
          >
          <button type="button" class="auth-pw-toggle" (click)="togglePw()">
            @if (showPw()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.9 17.9A10.5 10.5 0 0 1 12 19.5C6 19.5 1.5 12 1.5 12a18.3 18.3 0 0 1 5.1-5.9M9.9 4.7A10 10 0 0 1 12 4.5c6 0 10.5 7.5 10.5 7.5a18.5 18.5 0 0 1-2.4 3.4M3 3l18 18"/><circle cx="12" cy="12" r="3"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1.5 12S6 4.5 12 4.5 22.5 12 22.5 12 18 19.5 12 19.5 1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <button class="auth-btn" [disabled]="state.loading()" (click)="submit()">
        @if (state.loading()) { Signing in… } @else { Sign in }
      </button>

      <div class="auth-divider"><span>or</span></div>

      <button class="auth-google-btn" [disabled]="state.loading()" (click)="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-switch">
        New here?
        <button class="auth-link" (click)="goToSignup()">Create an account</button>
      </p>
    </div>

  </div>
</div>
