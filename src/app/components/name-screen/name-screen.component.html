<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:440px;animation:scfade .4s ease both">
    <div style="text-align:center;margin-bottom:26px">
      <div style="width:64px;height:64px;border-radius:21px;background:#2f6b4f;display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 10px 26px rgba(47,107,79,.30)">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="#eef3ef">
          <path d="M12 17.5 C8.4 16 4.8 13.4 3 9.8 C6.8 10 10 12.8 12 17.5 Z" fill-opacity=".5"/>
          <path d="M12 17.5 C15.6 16 19.2 13.4 21 9.8 C17.2 10 14 12.8 12 17.5 Z" fill-opacity=".5"/>
          <path d="M12 17.5 C9.6 14.2 7.8 10.8 7.4 6.8 C10.2 8.4 11.4 12.6 12 17.5 Z" fill-opacity=".8"/>
          <path d="M12 17.5 C14.4 14.2 16.2 10.8 16.6 6.8 C13.8 8.4 12.6 12.6 12 17.5 Z" fill-opacity=".8"/>
          <path d="M12 4 C13.4 8.5 13.4 13 12 17.5 C10.6 13 10.6 8.5 12 4 Z"/>
        </svg>
      </div>
      <h1 style="font-family:'Spectral',serif;font-weight:600;font-size:34px;margin:0 0 10px;letter-spacing:-.01em">Sadhana Report</h1>
      <p style="margin:0 auto;max-width:330px;color:#7d8a82;font-size:15.5px;line-height:1.6;font-style:italic;font-family:'Spectral',serif">"The discipline you keep today becomes the grace you receive tomorrow."</p>
    </div>
    <div style="background:#fff;border:1px solid #d9e3dc;border-radius:20px;padding:22px;box-shadow:0 14px 34px rgba(40,58,48,.07)">
      <label style="display:block;font-size:14px;font-weight:600;color:#566159;margin-bottom:8px">Who are you?</label>
      <div style="position:relative">
        <input
          class="name-input"
          [value]="nameInput()"
          (input)="onInput($event)"
          (focus)="onFocus()"
          (blur)="onBlur()"
          (keydown)="onKey($event)"
          placeholder="Type your name…"
        >
        @if (canShowSug) {
          <div class="sug-dropdown">
            @for (sug of suggestions; track sug.name) {
              <div (mousedown)="sug.onPick()" class="sug-item">
                <div class="sug-avatar">{{ sug.initial }}</div>
                <span style="font-size:15px;flex:1">{{ sug.name }}</span>
              </div>
            }
          </div>
        }
      </div>
      <button (click)="continue()" class="continue-btn">Continue</button>
    </div>
  </div>
</div>
